name: Pages redirect to Vercel

# github.io DNS is owned by GitHub — cannot point A/CNAME to Vercel.
# This keeps https://hasslercode.github.io working by redirecting to the Next.js app on Vercel.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-redirect
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Prepare redirect site
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0;url=https://portafolio-hass.vercel.app/es/" />
              <link rel="canonical" href="https://portafolio-hass.vercel.app/es/" />
              <title>Hassler Isaac — redirect</title>
              <script>
                (function () {
                  var target = "https://portafolio-hass.vercel.app";
                  var path = location.pathname || "/";
                  if (path === "/" || path === "/index.html") path = "/es/";
                  location.replace(target + path + location.search + location.hash);
                })();
              </script>
            </head>
            <body>
              <p>
                Redirigiendo a
                <a href="https://portafolio-hass.vercel.app/es/">portafolio-hass.vercel.app</a>…
              </p>
            </body>
          </html>
          EOF
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
